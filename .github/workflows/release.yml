name: Build and Release Binaries

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          npm ci
          npx svelte-kit sync
          npx vite --config common.config.js build
          npx vite --config app.config.js build
        shell: bash

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PRIMO_VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          go build \
            -ldflags="-s -w \
              -X 'github.com/palacms/palacms/internal.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)' \
              -X 'github.com/palacms/palacms/internal.buildVersion=${PRIMO_VERSION}'" \
            -o palacms_${{ matrix.goos }}_${{ matrix.goarch }}${ext} .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: palacms_${{ matrix.goos }}_${{ matrix.goarch }}
          path: palacms_*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/*
          draft: true
