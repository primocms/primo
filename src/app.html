<!doctype html>
<html lang="en" class="dark">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" type="image/png" href="/admin/favicon.png" />
	%sveltekit.head%
</head>

<body style="overscroll-behavior: none; background: #0a0a0a">
	<div id="app-boot-loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0a; z-index: 9999">
		<div style="width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.7); border-radius: 50%; animation: app-boot-spin 0.8s linear infinite"></div>
	</div>
	<style>
		@keyframes app-boot-spin { to { transform: rotate(360deg) } }
		#app-boot-loader.hidden { opacity: 0; transition: opacity 0.2s; pointer-events: none }
	</style>
	<div style="display: contents">%sveltekit.body%</div>
	<link rel="preconnect" href="https://fonts.bunny.net" />
	<link href="https://fonts.bunny.net/css?family=inter:300,400,500,600,700,800" rel="stylesheet" />
</body>

</html>
